<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#030b18"/>
<meta name="description" content="Estado de playas para nadadores de aguas abiertas en Lima"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="OW Lima"/>
<link rel="manifest" href="manifest.json"/>
<title>OW Lima — Playas para Nadadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root{
  --bg:      #030b18;
  --dp:      #071526;
  --sf:      #0d2035;
  --sf2:     #112540;
  --glass:   rgba(7,21,38,.88);
  --line:    rgba(255,255,255,.07);
  --line2:   rgba(255,255,255,.12);
  --cyan:    #00e5ff;
  --green:   #00e676;
  --amber:   #ffab00;
  --red:     #ff1744;
  --white:   #ecf4fb;
  --muted:   #4e7a94;
  --label:   #7aafc8;
  --fh:      'Syne',sans-serif;
  --fm:      'DM Mono',monospace;
  --fb:      'DM Sans',sans-serif;
  --r:       10px;
  --r2:      14px;
}

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--fb);
  font-size:16px;
  min-height:100dvh;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ═══════════════════════════════════════
   LOADER
═══════════════════════════════════════ */
#loader{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s ease;
}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--sf2);
  border-top-color:var(--cyan);
  animation:spin .75s linear infinite;
}
.ld-txt{
  font-family:var(--fm);font-size:.6rem;
  letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);margin-top:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════
   WAVE CANVAS
═══════════════════════════════════════ */
#wv{
  position:fixed;top:0;left:0;
  width:100%;height:220px;
  pointer-events:none;z-index:0;opacity:.3;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.hd{
  position:relative;z-index:5;
  padding:clamp(22px,5vw,34px) 20px 0;
  text-align:center;
}
.hd-logo{
  font-family:var(--fh);
  font-size:clamp(1.9rem,6vw,2.8rem);
  font-weight:800;letter-spacing:-.01em;
  line-height:1;
}
.hd-logo span{color:var(--cyan)}
.hd-sub{
  font-family:var(--fm);font-size:.58rem;
  letter-spacing:.28em;text-transform:uppercase;
  color:var(--muted);margin-top:5px;
}
.hd-time{
  font-family:var(--fm);font-size:.6rem;
  color:var(--muted);margin-top:5px;
}
.hd-time b{color:var(--cyan);font-weight:400}

/* ═══════════════════════════════════════
   BEACH NAV
═══════════════════════════════════════ */
.bnav{
  position:sticky;top:0;z-index:100;
  background:rgba(3,11,24,.93);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  padding:10px 16px;margin-top:16px;
}
.bscroll{
  display:flex;gap:7px;
  overflow-x:auto;scrollbar-width:none;
}
.bscroll::-webkit-scrollbar{display:none}
.btab{
  flex-shrink:0;
  display:flex;align-items:center;gap:7px;
  background:var(--sf);
  border:1px solid var(--line);
  border-radius:32px;
  padding:8px 15px;
  transition:all .2s;
}
.btab:hover{border-color:var(--line2)}
.btab.on{
  border-color:var(--cyan);
  background:var(--cyan);
  box-shadow:0 0 18px rgba(0,229,255,.22);
}
.btab-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--muted);
  flex-shrink:0;transition:background .3s;
}
.btab.on .btab-dot{background:#000}
.btab-nm{
  font-family:var(--fh);font-size:.78rem;
  font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--label);
  white-space:nowrap;transition:color .2s;
}
.btab.on .btab-nm{color:#000}

/* ═══════════════════════════════════════
   MAIN
═══════════════════════════════════════ */
.main{
  max-width:680px;margin:0 auto;
  padding:14px 14px 110px;
  position:relative;z-index:5;
}

/* ═══════════════════════════════════════
   HERO CARD — "¿Puedo nadar?"
═══════════════════════════════════════ */
.hero{
  border-radius:var(--r2);
  border:1px solid var(--line);
  background:var(--glass);
  backdrop-filter:blur(14px);
  overflow:hidden;margin-bottom:10px;
  animation:fadeUp .35s ease both;
}
.hero-stripe{
  height:4px;
  background:var(--sc, var(--cyan));
  transition:background .4s;
}
.hero-body{padding:18px 18px 20px}
.hero-top{
  display:flex;justify-content:space-between;
  align-items:flex-start;gap:10px;
}
.hero-left{}
.hero-nm{
  font-family:var(--fh);
  font-size:clamp(1.7rem,5.5vw,2.4rem);
  font-weight:800;line-height:1;
  letter-spacing:-.02em;
}
.hero-dist{
  font-size:.7rem;color:var(--muted);
  font-family:var(--fm);margin-top:3px;
}

/* Verdict */
.verdict{
  display:inline-flex;align-items:center;gap:9px;
  padding:9px 15px;border-radius:7px;
  border:1.5px solid var(--sc,var(--cyan));
  background:rgba(0,0,0,.28);
  margin-top:12px;
}
.vd-pulse{
  width:10px;height:10px;border-radius:50%;
  background:var(--sc,var(--cyan));
  animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.vd-wrap{}
.vd-txt{
  font-family:var(--fh);font-size:.95rem;
  font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;
  color:var(--sc,var(--cyan));
  line-height:1;
}
.vd-sub{
  font-size:.65rem;color:var(--muted);
  margin-top:2px;
}

/* Score ring */
.score-ring{
  flex-shrink:0;text-align:center;
}
.sr-circle{
  width:72px;height:72px;border-radius:50%;
  border:2.5px solid var(--sc,var(--cyan));
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.38);
  box-shadow:0 0 22px rgba(0,0,0,.4);
  transition:all .4s;
}
.sr-num{
  font-family:var(--fh);font-size:1.6rem;
  font-weight:800;line-height:1;
  color:var(--sc,var(--cyan));
  transition:color .4s;
}
.sr-lbl{
  font-family:var(--fm);font-size:.42rem;
  letter-spacing:.12em;color:var(--muted);
  text-transform:uppercase;margin-top:1px;
}

/* KPIs */
.kpis{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-top:16px;
  padding-top:14px;border-top:1px solid var(--line);
}
.kpi{text-align:center}
.kv{
  font-family:var(--fm);font-size:1.2rem;
  font-weight:500;line-height:1;
}
.ku{font-size:.6rem;color:var(--muted)}
.kl{
  font-size:.62rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  margin-top:3px;
}

/* Wave bar inside hero */
.wbar-wrap{margin-top:14px}
.wbar-head{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:5px;
}
.wbar-label{font-size:.68rem;color:var(--label)}
.wbar-human{
  font-size:.72rem;font-weight:500;
}
.wbar-track{
  height:7px;background:var(--sf2);
  border-radius:4px;overflow:hidden;
}
.wbar-fill{
  height:100%;border-radius:4px;
  transition:width .7s ease,background .4s;
}
.wbar-scale{
  display:flex;justify-content:space-between;
  font-family:var(--fm);font-size:.52rem;
  color:var(--muted);margin-top:3px;
}
.wbar-who{
  font-family:var(--fm);font-size:.62rem;
  margin-top:4px;
}

/* Tags */
.tags{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:12px;
}
.tag{
  font-family:var(--fm);font-size:.58rem;
  letter-spacing:.07em;text-transform:uppercase;
  padding:4px 9px;border-radius:4px;border:1px solid;
}
.tg{color:var(--green);border-color:rgba(0,230,118,.28);background:rgba(0,230,118,.07)}
.ty{color:var(--amber);border-color:rgba(255,171,0,.28);background:rgba(255,171,0,.07)}
.tr{color:var(--red);border-color:rgba(255,23,68,.28);background:rgba(255,23,68,.07)}

/* Best time */
.best{
  display:flex;align-items:center;gap:9px;
  padding:10px 13px;border-radius:7px;
  margin-top:10px;
  background:rgba(0,230,118,.06);
  border:1px solid rgba(0,230,118,.2);
}
.best.none{
  background:rgba(255,171,0,.05);
  border-color:rgba(255,171,0,.18);
}
.best-ico{font-size:1rem}
.best-txt{font-size:.75rem;color:var(--label);line-height:1.4}
.best-txt b{color:var(--green);font-family:var(--fm);font-weight:400}
.best.none .best-txt b{color:var(--amber)}

/* DIGESA in hero */
.dg{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;border-radius:7px;
  margin-top:10px;border:1.5px solid;
}
.dg.ok{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.06)}
.dg.bad{border-color:rgba(255,23,68,.32);background:rgba(255,23,68,.07)}
.dg.nd{border-color:rgba(78,122,148,.28);background:rgba(78,122,148,.06)}
.dg-ico{font-size:1.3rem;flex-shrink:0}
.dg-title{
  font-family:var(--fh);font-size:.82rem;
  font-weight:700;letter-spacing:.04em;
  line-height:1;
}
.dg.ok .dg-title{color:var(--green)}
.dg.bad .dg-title{color:var(--red)}
.dg.nd .dg-title{color:var(--muted)}
.dg-sub{font-size:.64rem;color:var(--muted);margin-top:2px}

/* ═══════════════════════════════════════
   SECTION CARDS
═══════════════════════════════════════ */
.sec{
  background:var(--glass);
  backdrop-filter:blur(14px);
  border:1px solid var(--line);
  border-radius:var(--r2);
  padding:16px;
  margin-bottom:10px;
  animation:fadeUp .35s ease both;
}
.sec-hd{
  display:flex;align-items:center;gap:8px;
  font-family:var(--fm);font-size:.58rem;
  font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:13px;
}
.sec-hd::after{
  content:'';flex:1;height:1px;
  background:var(--line);
}
.sec-ico{font-size:.9rem}

/* Data rows */
.dr{
  display:flex;justify-content:space-between;
  align-items:center;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.035);
}
.dr:last-child{border-bottom:none}
.dk{font-size:.78rem;color:var(--label)}
.dv{
  font-family:var(--fm);font-size:.85rem;
  font-weight:500;color:var(--white);
  text-align:right;
}
.du{font-size:.62rem;color:var(--muted);font-weight:300}
.dm{font-size:.7rem;color:var(--muted)} /* meaning */

/* Scale */
.scl{margin-top:8px;margin-bottom:4px}
.scl-track{
  height:6px;background:var(--sf2);
  border-radius:3px;overflow:hidden;
}
.scl-fill{height:100%;border-radius:3px;transition:width .7s ease}
.scl-lbs{
  display:flex;justify-content:space-between;
  font-family:var(--fm);font-size:.5rem;
  color:var(--muted);margin-top:3px;
}
.scl-human{
  font-size:.72rem;font-weight:500;
  margin-top:5px;
}
.scl-who{font-size:.65rem;color:var(--muted);margin-top:1px}

/* Tip box */
.tip{
  padding:10px 12px;
  background:rgba(0,229,255,.04);
  border-left:2px solid rgba(0,229,255,.25);
  border-radius:0 6px 6px 0;
  margin-top:10px;
  font-size:.72rem;color:var(--label);line-height:1.5;
}

/* Two-col layout */
.cols2{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:10px;
}
@media(max-width:360px){.cols2{grid-template-columns:1fr}}

/* ═══════════════════════════════════════
   COMPASS
═══════════════════════════════════════ */
.compass-wrap{
  display:flex;align-items:center;gap:14px;
  margin-top:4px;
}
.compass-svg{width:60px;height:60px;flex-shrink:0}
.compass-data{}
.compass-spd{
  font-family:var(--fm);font-size:1.35rem;
  font-weight:500;line-height:1;
}
.compass-unit{font-size:.62rem;color:var(--muted)}
.compass-dir{font-size:.72rem;color:var(--label);margin-top:3px}
.compass-desc{font-size:.68rem;color:var(--muted);margin-top:1px}
.compass-impact{font-size:.68rem;margin-top:2px}

/* ═══════════════════════════════════════
   TEMPERATURE
═══════════════════════════════════════ */
.temp-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-top:4px;
}
.temp-box{
  background:rgba(0,0,0,.22);border-radius:8px;
  padding:12px;text-align:center;
}
.temp-val{
  font-family:var(--fm);font-size:1.55rem;
  font-weight:500;line-height:1;
}
.temp-lbl{font-size:.62rem;color:var(--muted);margin-top:3px}
.temp-hint{font-size:.67rem;color:var(--label);margin-top:5px;line-height:1.4}

/* ═══════════════════════════════════════
   UV
═══════════════════════════════════════ */
.uv-top{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.uv-num{
  font-family:var(--fm);font-size:2.2rem;
  font-weight:500;line-height:1;
}
.uv-badge{
  font-family:var(--fh);font-size:.78rem;
  font-weight:700;letter-spacing:.05em;
  padding:5px 12px;border-radius:5px;
  border:1px solid;
}
.uv-track{
  height:8px;border-radius:4px;
  background:linear-gradient(to right,#00e676,#c6e03b,#ff9800,#f44336,#9c27b0);
  position:relative;
}
.uv-marker{
  position:absolute;top:-4px;
  width:16px;height:16px;
  background:#fff;border-radius:50%;
  border:2.5px solid #000;
  transform:translateX(-50%);
  transition:left .6s ease;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.uv-scale{
  display:flex;justify-content:space-between;
  font-family:var(--fm);font-size:.52rem;
  color:var(--muted);margin-top:4px;
}
.uv-advice{font-size:.73rem;color:var(--label);margin-top:10px;line-height:1.5}

/* ═══════════════════════════════════════
   FORECAST
═══════════════════════════════════════ */
.fc-rail{
  display:flex;gap:7px;
  overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;
}
.fc-rail::-webkit-scrollbar{display:none}
.fc-item{
  flex-shrink:0;min-width:66px;
  background:var(--sf);
  border:1px solid var(--line);
  border-radius:9px;
  padding:9px 8px;text-align:center;
  position:relative;overflow:hidden;
}
.fc-item::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
}
.fc-item.g::before{background:var(--green)}
.fc-item.y::before{background:var(--amber)}
.fc-item.r::before{background:var(--red)}
.fc-t{
  font-family:var(--fm);font-size:.56rem;
  color:var(--muted);margin-bottom:5px;
}
.fc-w{
  font-family:var(--fm);font-size:.9rem;
  font-weight:500;
}
.fc-wu{font-size:.52rem;color:var(--muted)}
.fc-wi{font-size:.62rem;color:var(--label);margin-top:3px}
.fc-lbl{
  font-family:var(--fh);font-size:.52rem;
  font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;margin-top:5px;
}
.fc-item.g .fc-lbl{color:var(--green)}
.fc-item.y .fc-lbl{color:var(--amber)}
.fc-item.r .fc-lbl{color:var(--red)}

.legend{
  display:flex;gap:12px;flex-wrap:wrap;
  margin-top:10px;
}
.leg{
  display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:.58rem;
  color:var(--muted);
}
.leg-d{width:8px;height:8px;border-radius:50%}

/* ═══════════════════════════════════════
   GUIDE
═══════════════════════════════════════ */
.guide-btn{
  width:100%;
  background:var(--sf);
  border:1px solid var(--line);
  border-radius:var(--r2);
  padding:15px 16px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
  transition:border-color .2s;
  animation:fadeUp .35s ease both;
}
.guide-btn:hover{border-color:var(--line2)}
.guide-btn-l{display:flex;align-items:center;gap:10px}
.guide-ico{font-size:1.2rem}
.guide-ttl{
  font-family:var(--fh);font-size:.95rem;
  font-weight:700;color:var(--white);
  text-align:left;
}
.guide-sub{font-size:.65rem;color:var(--muted);margin-top:1px;text-align:left}
.guide-arr{
  font-size:.85rem;color:var(--muted);
  transition:transform .3s;
}
.guide-arr.open{transform:rotate(180deg)}

.guide-body{display:none}
.guide-body.open{
  display:block;
  animation:fadeUp .3s ease;
}

.gsec{
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:var(--r2);
  overflow:hidden;margin-bottom:8px;
}
.gsec-hd{
  padding:13px 15px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
}
.gsec-ico{font-size:1.1rem}
.gsec-ttl{
  font-family:var(--fh);font-size:.88rem;
  font-weight:700;flex:1;
}
.gsec-chev{font-size:.75rem;color:var(--muted);transition:transform .25s}
.gsec-chev.open{transform:rotate(180deg)}
.gsec-body{display:none;padding:0 15px 14px}
.gsec-body.open{display:block}

/* Guide tables */
.gtable{width:100%;border-collapse:collapse;margin-top:10px}
.gtable th{
  font-family:var(--fm);font-size:.52rem;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);padding:7px 10px;
  text-align:left;border-bottom:1px solid var(--line);
}
.gtable td{
  padding:9px 10px;font-size:.74rem;
  border-bottom:1px solid rgba(255,255,255,.03);
  line-height:1.4;vertical-align:top;
}
.gtable tr:last-child td{border-bottom:none}
.gtable td:first-child{
  font-family:var(--fm);font-size:.72rem;
  white-space:nowrap;
}
.gtable td.cg{color:var(--green)}
.gtable td.cy{color:var(--amber)}
.gtable td.cr{color:var(--red)}
.gtable td.nm{color:var(--label)}

/* Score guide cards */
.sg-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-top:10px;
}
.sg{
  text-align:center;padding:12px 6px;
  border-radius:8px;border:1px solid;
}
.sg.g{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.06)}
.sg.y{border-color:rgba(255,171,0,.3);background:rgba(255,171,0,.06)}
.sg.r{border-color:rgba(255,23,68,.3);background:rgba(255,23,68,.06)}
.sg-n{
  font-family:var(--fh);font-size:1rem;
  font-weight:800;
}
.sg.g .sg-n{color:var(--green)}
.sg.y .sg-n{color:var(--amber)}
.sg.r .sg-n{color:var(--red)}
.sg-lbl{font-size:.62rem;color:var(--muted);margin-top:3px}
.sg-hint{font-size:.6rem;margin-top:4px;line-height:1.3}
.sg.g .sg-hint{color:rgba(0,230,118,.65)}
.sg.y .sg-hint{color:rgba(255,171,0,.65)}
.sg.r .sg-hint{color:rgba(255,23,68,.65)}

/* Guide highlight */
.ghlt{
  padding:10px 12px;
  background:rgba(0,229,255,.05);
  border-left:2px solid rgba(0,229,255,.3);
  border-radius:0 7px 7px 0;
  margin-top:10px;
  font-size:.72rem;color:var(--label);line-height:1.55;
}
.ghlt b{color:var(--white);font-weight:500}

/* ═══════════════════════════════════════
   BOTTOM BAR
═══════════════════════════════════════ */
.bbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(3,11,24,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--line);
  padding:9px 18px;
  padding-bottom:calc(9px + env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-between;
  z-index:200;
}
.bb-info{
  font-family:var(--fm);font-size:.57rem;
  color:var(--muted);line-height:1.6;
}
.bb-info span{color:var(--cyan)}
.bb-ref{
  font-family:var(--fm);font-size:.57rem;
  color:var(--muted);text-align:right;
}
.rfbtn{
  display:flex;align-items:center;gap:6px;
  background:var(--sf);
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--cyan);
  font-family:var(--fm);font-size:.6rem;
  letter-spacing:.1em;text-transform:uppercase;
  padding:8px 14px;
  transition:all .2s;
}
.rfbtn:hover{background:var(--cyan);color:#000}
.rfbtn svg{width:11px;height:11px;flex-shrink:0}
.rfbtn.spinning svg{animation:spin .5s linear infinite}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.stagger > *:nth-child(1){animation-delay:.04s}
.stagger > *:nth-child(2){animation-delay:.08s}
.stagger > *:nth-child(3){animation-delay:.12s}
.stagger > *:nth-child(4){animation-delay:.16s}
.stagger > *:nth-child(5){animation-delay:.20s}
.stagger > *:nth-child(6){animation-delay:.24s}
.stagger > *:nth-child(7){animation-delay:.28s}
.stagger > *:nth-child(8){animation-delay:.32s}

/* Error */
.err{
  text-align:center;padding:40px 20px;
  background:rgba(255,23,68,.06);
  border:1px solid rgba(255,23,68,.18);
  border-radius:var(--r2);margin-bottom:10px;
}
.err-ico{font-size:1.6rem;margin-bottom:8px}
.err-ttl{
  font-family:var(--fh);font-size:1.1rem;
  font-weight:700;margin-bottom:4px;
}
.err-sub{font-family:var(--fm);font-size:.65rem;color:var(--muted)}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="ld-ring"></div>
  <div class="ld-txt">Cargando datos del mar</div>
</div>

<!-- Wave background -->
<canvas id="wv"></canvas>

<!-- Header -->
<header class="hd">
  <div class="hd-logo">OW<span> Lima</span></div>
  <div class="hd-sub">Open Water · Playas para Nadadores</div>
  <div class="hd-time" id="hdTime">Cargando...</div>
</header>

<!-- Beach nav -->
<nav class="bnav">
  <div class="bscroll" id="bRail"></div>
</nav>

<!-- Main -->
<main class="main" id="main"></main>

<!-- Bottom bar -->
<div class="bbar">
  <div class="bb-info">
    <div>Open-Meteo Marine API</div>
    <div id="bbCoords"><span>—</span></div>
  </div>
  <button class="rfbtn" id="rfBtn" onclick="doRefresh()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Actualizar
  </button>
</div>

<script>
/* ══════════════════════════════
   BEACHES CONFIG
══════════════════════════════ */
const BEACHES = [
  {id:'herradura', name:'La Herradura', short:'Herradura',
   lat:-12.1706, lon:-77.0352, district:'Chorrillos',
   digesa:'ok',
   note:'Bahía semiabierta, aguas relativamente protegidas. Ideal para entrenamiento en circuito.'},
  {id:'pescadores', name:'Pescadores', short:'Pescadores',
   lat:-12.1622, lon:-77.0257, district:'Chorrillos',
   digesa:'ok',
   note:'Zona vigilada por la Marina, menor afluencia. Buena visibilidad del agua.'},
  {id:'aguadulce', name:'Agua Dulce', short:'Agua Dulce',
   lat:-12.1578, lon:-77.0243, district:'Chorrillos',
   digesa:'nd',
   note:'La playa más concurrida de Lima. Salvavidas presentes. Verificar estado sanitario.'},
  {id:'yuyos', name:'Yuyos', short:'Yuyos',
   lat:-12.1560, lon:-77.0232, district:'Chorrillos',
   digesa:'bad',
   note:'Zona con fondo parcialmente rocoso. Revisar estado sanitario antes de ingresar.'},
  {id:'sombrillas', name:'Sombrillas', short:'Sombrillas',
   lat:-12.1549, lon:-77.0224, district:'Chorrillos',
   digesa:'ok',
   note:'Contigua a Agua Dulce, algo más tranquila. Condiciones muy similares.'},
];

const DIGESA_DATA = {
  ok:  {cls:'ok',  icon:'✅', title:'Saludable — DIGESA',       sub:'Agua apta · Arena limpia · SSHH disponibles'},
  bad: {cls:'bad', icon:'🚫', title:'No Saludable — DIGESA',    sub:'No cumple criterios sanitarios oficiales'},
  nd:  {cls:'nd',  icon:'⚪', title:'Sin datos recientes — DIGESA', sub:'Verificar en veranosaludable.minsa.gob.pe'},
};

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let active = 0;
let cache  = {};

/* ══════════════════════════════
   FETCH
══════════════════════════════ */
async function fetchBeach(b) {
  const {lat,lon} = b;
  const [mr,wr] = await Promise.all([
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height,wave_direction,wave_period,wind_wave_height,wind_wave_period,swell_wave_height,swell_wave_direction,swell_wave_period,sea_surface_temperature&hourly=wave_height,swell_wave_height&timezone=America%2FLima&forecast_days=1`),
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,wind_direction_10m,uv_index&hourly=wind_speed_10m,wind_direction_10m,uv_index&timezone=America%2FLima&forecast_days=1`)
  ]);
  return {marine:await mr.json(), weather:await wr.json()};
}

/* ══════════════════════════════
   CALCULATIONS
══════════════════════════════ */
function calcScore(d) {
  const wh   = d.marine.current?.wave_height     ?? 1.5;
  const wp   = d.marine.current?.wave_period     ?? 8;
  const wind = d.weather.current?.wind_speed_10m ?? 15;
  const uv   = d.weather.current?.uv_index       ?? 5;
  let s = 100;
  if      (wh > 2.5) s -= 50;
  else if (wh > 1.8) s -= 30;
  else if (wh > 1.2) s -= 15;
  else if (wh > 0.7) s -= 5;
  if      (wp < 6)   s -= 20;
  else if (wp < 8)   s -= 10;
  if      (wind > 30) s -= 25;
  else if (wind > 20) s -= 12;
  else if (wind > 12) s -= 4;
  if (uv > 11) s -= 8;
  return Math.max(0, Math.min(100, Math.round(s)));
}

function getVerdict(s) {
  if (s >= 75) return {txt:'APTO PARA NADAR',    sub:'Condiciones óptimas',          col:'var(--green)'};
  if (s >= 50) return {txt:'PRECAUCIÓN',          sub:'Solo nadadores con experiencia',col:'var(--amber)'};
  return              {txt:'NO RECOMENDADO',      sub:'Condiciones adversas hoy',      col:'var(--red)'};
}

function getBestHour(d) {
  const wh = d.marine.hourly?.wave_height     ?? [];
  const ws = d.weather.hourly?.wind_speed_10m ?? [];
  const good = [];
  for (let h=5; h<=18; h++) {
    if ((wh[h]??99) < 1.0 && (ws[h]??99) < 15) good.push(h);
  }
  if (!good.length) return null;
  const f = h => String(h).padStart(2,'0')+':00';
  // group contiguous hours
  const segs=[]; let a=good[0],b=good[0];
  for (let i=1;i<good.length;i++){
    if(good[i]===b+1){b=good[i]}
    else{segs.push(a===b?f(a):`${f(a)}–${f(b+1)}`);a=b=good[i];}
  }
  segs.push(a===b?f(a):`${f(a)}–${f(b+1)}`);
  return segs.join(', ');
}

function waveInfo(h) {
  if (h < 0.3) return {txt:'Plana',         who:'✅ Todos los niveles',        col:'var(--green)'};
  if (h < 0.6) return {txt:'Muy calma',     who:'✅ Todos los niveles',        col:'var(--green)'};
  if (h < 1.0) return {txt:'Ligera',        who:'✅ Principiante a Avanzado',  col:'var(--green)'};
  if (h < 1.5) return {txt:'Moderada',      who:'⚠️ Intermedio a Avanzado',    col:'var(--amber)'};
  if (h < 2.0) return {txt:'Importante',    who:'⚠️ Solo nadadores avanzados', col:'var(--amber)'};
  if (h < 2.5) return {txt:'Fuerte',        who:'🚫 No recomendado',           col:'var(--red)'};
  return              {txt:'Muy fuerte',    who:'🚨 Peligroso',                col:'var(--red)'};
}

function windInfo(w) {
  if (w < 5)  return {txt:'Calma',              impact:'Sin impacto para el nadador',    col:'var(--green)'};
  if (w < 15) return {txt:'Brisa suave',        impact:'Impacto mínimo',                 col:'var(--green)'};
  if (w < 25) return {txt:'Brisa fresca',       impact:'Deriva lateral leve',            col:'var(--amber)'};
  if (w < 35) return {txt:'Viento fuerte',      impact:'Deriva significativa',           col:'var(--amber)'};
  return             {txt:'Viento muy fuerte',  impact:'⚠ Peligroso para nadar',         col:'var(--red)'};
}

function uvInfo(uv) {
  if (uv <=2)  return {cat:'Bajo',      col:'#00e676', advice:'Sin restricciones. Protector básico.'};
  if (uv <=5)  return {cat:'Moderado',  col:'#c6e03b', advice:'FPS 30+ resistente al agua y lentes UV400.'};
  if (uv <=7)  return {cat:'Alto',      col:'#ff9800', advice:'FPS 50+ obligatorio. Evita 10am–2pm.'};
  if (uv <=10) return {cat:'Muy Alto',  col:'#f44336', advice:'⚠ FPS 50+ y gorra. Limita exposición directa.'};
  return              {cat:'Extremo',   col:'#9c27b0', advice:'🚨 Protección máxima. Nada temprano (antes de las 8am).'};
}

function thermoInfo(t) {
  if (t < 17) return {emoji:'🥶', txt:`${t.toFixed(1)}°C — Traje 5mm necesario`};
  if (t < 20) return {emoji:'🌊', txt:`${t.toFixed(1)}°C — Traje 3mm recomendado`};
  if (t < 23) return {emoji:'✅', txt:`${t.toFixed(1)}°C — Sin traje, agradable`};
  return             {emoji:'☀️', txt:`${t.toFixed(1)}°C — Agua cálida`};
}

function periodInfo(p) {
  if (p < 6)  return 'Período muy corto — olas irregulares y confusas';
  if (p < 8)  return 'Período corto — olas frecuentes, más esfuerzo';
  if (p < 12) return 'Período regular — condiciones manejables';
  return             'Período largo — olas regulares y predecibles';
}

function compass(deg) {
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  return d[Math.round(deg/22.5)%16];
}

function getTags(d) {
  const wh=d.marine.current?.wave_height??0;
  const sw=d.marine.current?.swell_wave_height??0;
  const wi=d.weather.current?.wind_speed_10m??0;
  const uv=d.weather.current?.uv_index??0;
  const sst=d.marine.current?.sea_surface_temperature??0;
  const tags=[];
  if(wh<1.0)      tags.push({c:'tg',t:`Oleaje OK · ${wh.toFixed(2)}m`});
  else if(wh<1.8) tags.push({c:'ty',t:`Oleaje ${wh.toFixed(2)}m`});
  else            tags.push({c:'tr',t:`Oleaje ALTO · ${wh.toFixed(2)}m`});
  if(sw>=1.5)     tags.push({c:'ty',t:`Swell ${sw.toFixed(1)}m`});
  if(wi<15)       tags.push({c:'tg',t:'Viento OK'});
  else if(wi<25)  tags.push({c:'ty',t:`Viento ${Math.round(wi)} km/h`});
  else            tags.push({c:'tr',t:`Viento FUERTE`});
  if(uv>10)       tags.push({c:'tr',t:`UV EXTREMO · ${uv.toFixed(1)}`});
  else if(uv>7)   tags.push({c:'ty',t:`UV Alto · ${uv.toFixed(1)}`});
  else            tags.push({c:'tg',t:`UV OK · ${uv.toFixed(1)}`});
  if(sst<20)      tags.push({c:'ty',t:`Agua fría · ${sst.toFixed(1)}°C`});
  return tags;
}

function fcClass(wh, ws) {
  if (wh<1.0 && ws<15) return {c:'g',l:'Óptimo'};
  if (wh<1.8 && ws<25) return {c:'y',l:'Precaución'};
  return                     {c:'r',l:'Adverso'};
}

/* ══════════════════════════════
   RENDER TABS
══════════════════════════════ */
function renderRail() {
  const r = document.getElementById('bRail');
  r.innerHTML = BEACHES.map((b,i) => {
    const s = cache[b.id] ? calcScore(cache[b.id]) : null;
    const dc = s===null ? 'var(--muted)' : s>=75 ? 'var(--green)' : s>=50 ? 'var(--amber)' : 'var(--red)';
    return `<button class="btab${i===active?' on':''}" onclick="pick(${i})">
      <span class="btab-dot" style="${i!==active?`background:${dc}`:''}"></span>
      <span class="btab-nm">${b.short}</span>
    </button>`;
  }).join('');
}

/* ══════════════════════════════
   RENDER PAGE
══════════════════════════════ */
function renderPage(beach, d) {
  const sc  = calcScore(d);
  const vd  = getVerdict(sc);
  const m   = d.marine.current  ?? {};
  const w   = d.weather.current ?? {};
  const dg  = DIGESA_DATA[beach.digesa];

  const wh  = +(m.wave_height                ?? 0).toFixed(2);
  const wp  = +(m.wave_period                ?? 0).toFixed(1);
  const wvd = +(m.wave_direction             ?? 0);
  const wwh = +(m.wind_wave_height           ?? 0).toFixed(2);
  const wwp = +(m.wind_wave_period           ?? 0).toFixed(1);
  const swh = +(m.swell_wave_height          ?? 0).toFixed(2);
  const swd = +(m.swell_wave_direction       ?? 0);
  const swp = +(m.swell_wave_period          ?? 0).toFixed(1);
  const sst = +(m.sea_surface_temperature    ?? 0).toFixed(1);
  const air = +(w.temperature_2m             ?? 0).toFixed(1);
  const wsp = +(w.wind_speed_10m             ?? 0);
  const wdi = +(w.wind_direction_10m         ?? 0);
  const uv  = +(w.uv_index                  ?? 0);

  const wi   = waveInfo(wh);
  const wii  = windInfo(wsp);
  const uvi  = uvInfo(uv);
  const thi  = thermoInfo(+sst);
  const best = getBestHour(d);
  const tags = getTags(d);

  // Wave fill
  const wfp = Math.min(100,(wh/3)*100);
  const wfc = wh<1.0 ? 'var(--green)' : wh<1.8 ? 'var(--amber)' : 'var(--red)';

  // Forecast (next 12h)
  const nowH = new Date().getHours();
  let fcHtml = '';
  const hwh = d.marine.hourly?.wave_height ?? [];
  const hws = d.weather.hourly?.wind_speed_10m ?? [];
  for(let i=0;i<12;i++){
    const h = (nowH+i)%24;
    const fw = +(hwh[h]??0).toFixed(1);
    const fw2= Math.round(hws[h]??0);
    const fc = fcClass(fw,fw2);
    fcHtml += `<div class="fc-item ${fc.c}">
      <div class="fc-t">${String(h).padStart(2,'0')}:00</div>
      <div class="fc-w">${fw}<span class="fc-wu">m</span></div>
      <div class="fc-wi">💨 ${fw2}</div>
      <div class="fc-lbl">${fc.l}</div>
    </div>`;
  }

  // Compass SVG (wind)
  const na = wdi - 180;
  const compassSVG = `<svg class="compass-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="30" r="29" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    <circle cx="30" cy="30" r="29" fill="rgba(11,25,47,.7)"/>
    <text x="30" y="10" text-anchor="middle" fill="#4e7a94" font-size="6" font-family="DM Mono,monospace">N</text>
    <text x="30" y="55" text-anchor="middle" fill="#4e7a94" font-size="6" font-family="DM Mono,monospace">S</text>
    <text x="7" y="33" text-anchor="middle" fill="#4e7a94" font-size="6" font-family="DM Mono,monospace">O</text>
    <text x="53" y="33" text-anchor="middle" fill="#4e7a94" font-size="6" font-family="DM Mono,monospace">E</text>
    <g transform="translate(30,30) rotate(${na})">
      <polygon points="0,-15 2.5,0 0,5 -2.5,0" fill="#ff1744"/>
      <polygon points="0,15 2.5,0 0,-5 -2.5,0" fill="#4e7a94"/>
    </g>
    <circle cx="30" cy="30" r="3" fill="var(--cyan)"/>
  </svg>`;

  const html = `<div class="stagger">
<!-- ①  HERO -->
<div class="hero" style="--sc:${vd.col}">
  <div class="hero-stripe"></div>
  <div class="hero-body">
    <div class="hero-top">
      <div class="hero-left">
        <div class="hero-nm">${beach.name}</div>
        <div class="hero-dist">${beach.district} · Lima</div>
        <div class="verdict" style="--sc:${vd.col}">
          <span class="vd-pulse" style="background:${vd.col}"></span>
          <div class="vd-wrap">
            <div class="vd-txt" style="color:${vd.col}">${vd.txt}</div>
            <div class="vd-sub">${vd.sub}</div>
          </div>
        </div>
      </div>
      <div class="score-ring">
        <div class="sr-circle" style="border-color:${vd.col};box-shadow:0 0 20px ${vd.col}33">
          <div class="sr-num" style="color:${vd.col}">${sc}</div>
          <div class="sr-lbl">Score</div>
        </div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi">
        <div class="kv">${wh}<span class="ku"> m</span></div>
        <div class="kl">Oleaje</div>
      </div>
      <div class="kpi">
        <div class="kv">${Math.round(wsp)}<span class="ku"> km/h</span></div>
        <div class="kl">Viento</div>
      </div>
      <div class="kpi">
        <div class="kv" style="color:${uvi.col}">${uv.toFixed(1)}</div>
        <div class="kl">Índice UV</div>
      </div>
    </div>

    <!-- Wave bar -->
    <div class="wbar-wrap">
      <div class="wbar-head">
        <span class="wbar-label">Nivel de oleaje</span>
        <span class="wbar-human" style="color:${wfc}">${wi.txt}</span>
      </div>
      <div class="wbar-track">
        <div class="wbar-fill" style="width:${wfp}%;background:${wfc}"></div>
      </div>
      <div class="wbar-scale">
        <span>0m</span><span>0.5m</span><span>1m</span><span>1.5m</span><span>3m+</span>
      </div>
      <div class="wbar-who" style="color:${wfc}">${wi.who}</div>
    </div>

    <!-- Tags -->
    <div class="tags">${tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>

    <!-- Best time -->
    <div class="best${best?'':' none'}">
      <span class="best-ico">${best?'⏰':'⚠️'}</span>
      <div class="best-txt">
        ${best
          ? `Mejor hora para nadar hoy: <b>${best}</b>`
          : `<b>Sin ventana óptima hoy.</b> Condiciónes adversas durante el día.`}
      </div>
    </div>

    <!-- DIGESA -->
    <div class="dg ${dg.cls}">
      <span class="dg-ico">${dg.icon}</span>
      <div>
        <div class="dg-title">${dg.title}</div>
        <div class="dg-sub">${dg.sub}</div>
      </div>
    </div>
  </div>
</div>

<!-- ②  OLEAJE -->
<div class="sec">
  <div class="sec-hd"><span class="sec-ico">🌊</span>Oleaje</div>
  <div class="dr">
    <span class="dk">Altura actual</span>
    <span class="dv">${wh}<span class="du"> m</span></span>
  </div>
  <div class="scl">
    <div class="scl-track">
      <div class="scl-fill" style="width:${wfp}%;background:${wfc}"></div>
    </div>
    <div class="scl-lbs"><span>Plana</span><span>0.5m</span><span>1m</span><span>1.5m</span><span>3m+</span></div>
    <div class="scl-human" style="color:${wfc}">${wi.txt}</div>
    <div class="scl-who">${wi.who}</div>
  </div>
  <div class="dr">
    <span class="dk">Período de ola</span>
    <span class="dv">${wp}<span class="du"> s</span></span>
  </div>
  <div class="dr" style="border-bottom:none;padding-bottom:0">
    <span class="dk">Significado</span>
    <span class="dm" style="text-align:right;max-width:55%">${periodInfo(+wp)}</span>
  </div>
  <div class="dr">
    <span class="dk">Dirección</span>
    <span class="dv">${compass(wvd)} · ${Math.round(wvd)}<span class="du">°</span></span>
  </div>
  <div class="dr">
    <span class="dk">Ola de viento</span>
    <span class="dv">${wwh}<span class="du"> m</span> · ${wwp}<span class="du"> s</span></span>
  </div>
</div>

<!-- ③  SWELL -->
<div class="sec">
  <div class="sec-hd"><span class="sec-ico">〰️</span>Swell · Mar de fondo</div>
  <div class="dr">
    <span class="dk">Altura swell</span>
    <span class="dv">${swh}<span class="du"> m</span></span>
  </div>
  <div class="scl">
    <div class="scl-track">
      <div class="scl-fill" style="width:${Math.min(100,(+swh/3)*100)}%;background:${+swh<1?'var(--green)':+swh<2?'var(--amber)':'var(--red)'}"></div>
    </div>
    <div class="scl-lbs"><span>Calmo</span><span>1m</span><span>2m</span><span>3m+</span></div>
  </div>
  <div class="dr">
    <span class="dk">Período swell</span>
    <span class="dv">${swp}<span class="du"> s</span></span>
  </div>
  <div class="dr">
    <span class="dk">Dirección swell</span>
    <span class="dv">${compass(swd)} · ${Math.round(swd)}<span class="du">°</span></span>
  </div>
  <div class="tip">
    💡 Swell &gt;1.5m con período &lt;8s genera olas irregulares y más esfuerzo al nadar. Swell largo (&gt;10s) es más predecible.
  </div>
</div>

<!-- ④  VIENTO & TEMPERATURA (2 cols) -->
<div class="cols2">
  <div class="sec" style="margin-bottom:0">
    <div class="sec-hd"><span class="sec-ico">💨</span>Viento</div>
    <div class="compass-wrap">
      ${compassSVG}
      <div class="compass-data">
        <div class="compass-spd">${Math.round(wsp)}<span class="compass-unit"> km/h</span></div>
        <div class="compass-dir">${compass(wdi)} · ${Math.round(wdi)}°</div>
        <div class="compass-desc">${wii.txt}</div>
        <div class="compass-impact" style="color:${wii.col}">${wii.impact}</div>
      </div>
    </div>
  </div>
  <div class="sec" style="margin-bottom:0">
    <div class="sec-hd"><span class="sec-ico">🌡️</span>Temperatura</div>
    <div class="temp-grid">
      <div class="temp-box">
        <div class="temp-val" style="color:var(--cyan)">${sst}°</div>
        <div class="temp-lbl">Agua</div>
        <div class="temp-hint">${thi.emoji} ${thi.txt.split('—')[1]?.trim()||''}</div>
      </div>
      <div class="temp-box">
        <div class="temp-val">${air}°</div>
        <div class="temp-lbl">Aire</div>
        <div class="temp-hint" style="color:var(--muted)">Temperatura exterior</div>
      </div>
    </div>
  </div>
</div>

<!-- ⑤  UV -->
<div class="sec">
  <div class="sec-hd"><span class="sec-ico">☀️</span>Radiación UV</div>
  <div class="uv-top">
    <div class="uv-num" style="color:${uvi.col}">${uv.toFixed(1)}</div>
    <div class="uv-badge" style="color:${uvi.col};background:${uvi.col}18;border-color:${uvi.col}44">${uvi.cat}</div>
  </div>
  <div class="uv-track">
    <div class="uv-marker" style="left:${Math.min(97,(uv/12)*100)}%"></div>
  </div>
  <div class="uv-scale"><span>0</span><span>3</span><span>6</span><span>8</span><span>10</span><span>12+</span></div>
  <div class="uv-advice">${uvi.advice}</div>
</div>

<!-- ⑥  FORECAST -->
<div class="sec">
  <div class="sec-hd"><span class="sec-ico">📊</span>Pronóstico 12 horas</div>
  <div class="fc-rail">${fcHtml}</div>
  <div class="legend">
    <div class="leg"><div class="leg-d" style="background:var(--green)"></div>Óptimo</div>
    <div class="leg"><div class="leg-d" style="background:var(--amber)"></div>Precaución</div>
    <div class="leg"><div class="leg-d" style="background:var(--red)"></div>Adverso</div>
    <div class="leg" style="color:rgba(78,122,148,.6)">ola (m) · viento (km/h)</div>
  </div>
</div>

<!-- ⑦  NOTA -->
<div style="text-align:center;font-family:var(--fm);font-size:.6rem;color:var(--muted);padding:6px 0 2px;animation:fadeUp .35s ease both">

<!-- ⑧  GUIDE -->

  return html;
}

   GUIDE
══════════════════════════════ */

  <span class="guide-arr" id="garr">▼</span>

<div class="guide-body" id="gbody">

  <!-- A: Score -->

      <span class="gsec-ttl">Período de ola — ¿qué es y por qué importa?</span>
      <span class="gsec-chev">▼</span>

    <div class="gsec-body">
      <table class="gtable">
        <thead><tr><th>Período</th><th>Tipo</th><th>Impacto para el nadador</th></tr></thead>
        <tbody>

          <tr><td>3–5</td><td class="cg">Moderado</td><td class="nm">FPS 30+ resistente al agua</td></tr>

/* ══════════════════════════════
   TOGGLE GUIDE
══════════════════════════════ */
function toggleGuide() {
  const b = document.getElementById('gbody');
  const a = document.getElementById('garr');
  if (!b || !a) return;
  b.classList.toggle('open');
  a.classList.toggle('open');
}

function toggleSec(hd) {
  const body = hd.nextElementSibling;
  const chev = hd.querySelector('.gsec-chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

/* ══════════════════════════════
   SELECT BEACH
══════════════════════════════ */
async function pick(idx) {
  active = idx;
  renderRail();
  const beach = BEACHES[idx];
  document.getElementById('bbCoords').innerHTML =
    `<span>${beach.lat.toFixed(4)}, ${beach.lon.toFixed(4)}</span>`;

  const mc = document.getElementById('main');
  mc.style.opacity='0';
  mc.style.transform='translateY(8px)';
  mc.style.transition='none';

  if (!cache[beach.id]) {
    mc.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div class="ld-ring" style="margin:0 auto 14px"></div>
      <div style="font-family:var(--fm);font-size:.65rem;color:var(--muted)">${beach.name}</div>
    </div>`;
    requestAnimationFrame(() => {
      mc.style.transition = 'opacity .3s ease,transform .3s ease';
      mc.style.opacity = '1'; mc.style.transform = 'translateY(0)';
    });
  }

  try {
    if (!cache[beach.id]) cache[beach.id] = await fetchBeach(beach);
    mc.innerHTML = renderPage(beach, cache[beach.id]);
    renderRail();
  } catch(e) {
    mc.innerHTML = `<div class="err">
      <div class="err-ico">⚠️</div>
      <div class="err-ttl">Error cargando datos</div>
      <div class="err-sub">Verifica tu conexión e intenta de nuevo</div>
    </div>${buildGuide()}`;
  }

  requestAnimationFrame(() => {
    mc.style.transition = 'opacity .3s ease,transform .3s ease';
    mc.style.opacity = '1'; mc.style.transform = 'translateY(0)';
  });
}

/* ══════════════════════════════
   REFRESH
══════════════════════════════ */
async function doRefresh() {
  const btn = document.getElementById('rfBtn');
  btn.classList.add('spinning');
  cache = {};
  await pick(active);
  updateTime();
  btn.classList.remove('spinning');
}

function updateTime() {
  const el = document.getElementById('hdTime');
  if (!el) return;
  const n = new Date();
  el.innerHTML = `Actualizado: <b>${n.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}</b>`;
}

/* ══════════════════════════════
   WAVE CANVAS
══════════════════════════════ */
function initWaves() {
  const c = document.getElementById('wv');
  const ctx = c.getContext('2d');
  let t = 0;
  function resize() { c.width = innerWidth; c.height = 220; }
  resize();
  addEventListener('resize', resize);
  const waves = [
    {a:22,f:.011,sp:.018,y:130,col:'rgba(0,229,255,.12)'},
    {a:15,f:.017,sp:.026,y:150,col:'rgba(10,100,200,.10)'},
    {a:10,f:.024,sp:.012,y:105,col:'rgba(0,229,255,.06)'},
  ];
  (function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    waves.forEach(w=>{
      ctx.beginPath();ctx.moveTo(0,c.height);
      for(let x=0;x<=c.width;x++){
        ctx.lineTo(x, w.y + Math.sin(x*w.f + t*w.sp*60)*w.a);
      }
      ctx.lineTo(c.width,c.height);ctx.closePath();
      ctx.fillStyle=w.col;ctx.fill();
    });
    t+=.016;requestAnimationFrame(frame);
  })();
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
async function init() {
  initWaves();
  renderRail();
  await pick(0);
  updateTime();
  document.getElementById('loader').classList.add('out');
  setTimeout(()=>document.getElementById('loader')?.remove(), 600);
}

window.addEventListener('DOMContentLoaded', init);

/* ══════════════════════════════
   SERVICE WORKER
══════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
